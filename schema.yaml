id: https://w3id.org/study-ontology/
name: StudyOntology
description: LinkML schema for extracted knowledge entities and relationships.
license: APACHE 2.0

prefixes:
  linkml: https://w3id.org/linkml/
  study: https://w3id.org/study-ontology/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/

default_prefix: study
default_range: string

imports:
  - linkml:types

enums:

  RelationshipType:
    description: Types of relationships between knowledge entities.
    permissible_values:
      PREREQUISITE_OF:
        description: Subject must be learned before object.
        meaning: study:prerequisite_of
      EXAMPLE_OF:
        description: Subject is a concrete instance or example of object.
        meaning: study:example_of
      CONTRASTS_WITH:
        description: Subject is similar to but meaningfully different from object.
        meaning: study:contrasts_with
      LOCATED_IN:
        description: Subject is found within or part of object.
        meaning: study:located_in
      PRODUCES:
        description: Subject creates object as output.
        meaning: study:produces
      CONSUMES:
        description: Subject uses object as input.
        meaning: study:consumes
      APPLIES_TO:
        description: Theory or method subject applies to domain or concept object.
        meaning: study:applies_to
      ASSESSED_BY:
        description: Subject concept or theory is assessed by object assignment.
        meaning: study:assessed_by
      COVERS:
        description: Subject assignment covers or tests object concept, theory, or method.
        meaning: study:covers

  DifficultyLevel:
    description: Difficulty level for learning a concept.
    permissible_values:
      INTRODUCTORY:
        description: Suitable for beginners with no prerequisites.
      INTERMEDIATE:
        description: Requires some foundational knowledge.
      ADVANCED:
        description: Requires significant prior knowledge.
      EXPERT:
        description: Research-level or specialized content.

  DocumentOrigin:
    description: How the source document entered the system.
    permissible_values:
      USER_UPLOAD:
        description: Manually uploaded by the user through the application UI.
      CANVAS_API:
        description: Automatically fetched from the Canvas LMS API.
      WEB_SCRAPE:
        description: Scraped or downloaded from a web URL.
      MANUAL_ENTRY:
        description: Content entered directly as text by the user.

  AssignmentType:
    description: Type of assignment from Canvas or user-defined.
    permissible_values:
      HOMEWORK:
        description: Regular homework or problem set.
      QUIZ:
        description: Quiz or short assessment.
      EXAM:
        description: Midterm, final, or other major exam.
      PROJECT:
        description: Project or long-form deliverable.
      DISCUSSION:
        description: Discussion board post or participation assignment.
      LAB:
        description: Laboratory assignment or report.
      ESSAY:
        description: Written essay or paper.
      OTHER:
        description: Any other assignment type.

slots:

  id:
    description: Unique identifier for the entity.
    identifier: true
    required: true
    range: uriorcurie

  name:
    description: Human-readable name.
    required: true
    slot_uri: schema:name

  description:
    description: Detailed description of the entity.
    slot_uri: schema:description

  aliases:
    description: Alternative names or synonyms.
    multivalued: true
    exact_mappings:
      - schema:alternateName

  sources:
    description: Provenance records for this entity.
    multivalued: true
    range: ExtractionProvenance
    inlined_as_list: true

classes:

  KnowledgeEntity:
    abstract: true
    description: Abstract base for all knowledge graph entities.
    class_uri: schema:Thing
    close_mappings:
      - skos:Concept
    slots:
      - id
      - name
      - description
      - aliases
      - sources

  Concept:
    is_a: KnowledgeEntity
    description: A core idea, principle, or topic within a subject domain.
    class_uri: skos:Concept
    attributes:
      domain:
        description: Academic domain this concept belongs to.
        range: string
      difficulty_level:
        description: How advanced this concept is.
        range: DifficultyLevel
      field:
        description: Specific field within the domain.
        range: string
      prerequisites:
        description: Concepts that should be learned before this one.
        multivalued: true
        range: Concept
      prerequisite_of:
        description: Concepts that depend on this concept.
        multivalued: true
        range: Concept
      related_theories:
        description: Theories that explain or involve this concept.
        multivalued: true
        range: Theory
      related_methods:
        description: Methods that apply to or use this concept.
        multivalued: true
        range: Method

  Theory:
    is_a: KnowledgeEntity
    description: A scientific or academic framework, model, or paradigm.
    class_uri: schema:ScholarlyArticle
    close_mappings:
      - schema:Theory
    attributes:
      domain:
        description: Academic domain of this theory.
        range: string
      key_figures:
        description: People who developed or contributed to this theory.
        multivalued: true
        range: Person
      year_proposed:
        description: Year the theory was first proposed or published.
        range: integer
      key_concepts:
        description: Core concepts explained by this theory.
        multivalued: true
        range: Concept

  Person:
    is_a: KnowledgeEntity
    description: A researcher, scientist, or notable figure in an academic domain.
    class_uri: schema:Person
    attributes:
      birth_year:
        description: Year of birth.
        range: integer
      death_year:
        description: Year of death if applicable.
        range: integer
      field:
        description: Primary academic field of the person.
        range: string
      affiliation:
        description: Institution or organization the person is associated with.
        range: string
        slot_uri: schema:affiliation
      notable_contributions:
        description: Key theories or concepts this person contributed to.
        multivalued: true
        range: string

  Method:
    is_a: KnowledgeEntity
    description: A technique, process, or procedure used in academic practice.
    attributes:
      domain:
        description: Academic domain where this method is used.
        range: string
      inputs:
        description: What this method requires as input.
        multivalued: true
        range: string
      outputs:
        description: What this method produces as output.
        multivalued: true
        range: string
      equipment:
        description: Equipment or tools needed for this method.
        multivalued: true
        range: string
      related_concepts:
        description: Concepts this method operates on or produces.
        multivalued: true
        range: Concept

  Assignment:
    is_a: KnowledgeEntity
    description: A coursework assignment, exam, quiz, or project — typically sourced from Canvas LMS.
    attributes:
      assignment_type:
        description: The category of assignment.
        range: AssignmentType
      course_name:
        description: Name of the course this assignment belongs to.
        range: string
      course_id:
        description: Canvas course ID or other LMS identifier.
        range: string
      canvas_assignment_id:
        description: The assignment ID from the Canvas API.
        range: integer
      due_date:
        description: When the assignment is due.
        range: datetime
      points_possible:
        description: Maximum points available for this assignment.
        range: float
      submission_types:
        description: Allowed submission formats (e.g., online_upload, online_text_entry).
        multivalued: true
        range: string
      is_published:
        description: Whether the assignment is visible to students in Canvas.
        range: boolean
      html_url:
        description: Direct link to the assignment in Canvas.
        range: uri
      covers_concepts:
        description: Concepts that this assignment tests or covers.
        multivalued: true
        range: Concept
      covers_theories:
        description: Theories that this assignment tests or covers.
        multivalued: true
        range: Theory
      covers_methods:
        description: Methods that this assignment tests or covers.
        multivalued: true
        range: Method

  SourceDocument:
    description: A source document from which knowledge was extracted.
    class_uri: schema:DigitalDocument
    slots:
      - id
      - name
      - description
    attributes:
      document_type:
        description: Type of document such as PDF, slides, notes, textbook.
        range: string
      file_path:
        description: Path or URL to the source document.
        range: uri
      upload_date:
        description: When the document was added to the system.
        range: datetime
      page_count:
        description: Total number of pages in the document.
        range: integer
        minimum_value: 1
      origin:
        description: How this document entered the system (user upload, Canvas API, etc.).
        range: DocumentOrigin
        required: true
      canvas_file_id:
        description: File ID from the Canvas API, if sourced from Canvas.
        range: integer
      canvas_course_id:
        description: Canvas course ID this document belongs to, if sourced from Canvas.
        range: string

  ExtractionProvenance:
    description: Provenance record tracking where and how knowledge was extracted.
    class_uri: dcterms:ProvenanceStatement
    attributes:
      source_document:
        description: Reference to the source document.
        range: SourceDocument
        required: true
      section_title:
        description: Title of the section where the knowledge was found.
        range: string
      page_number:
        description: Page number in the source document.
        range: integer
        minimum_value: 1
      extraction_timestamp:
        description: When this extraction was performed.
        range: datetime
      extraction_method:
        description: Method used for extraction.
        range: string
      raw_text:
        description: Original text snippet from which knowledge was extracted.
        range: string

  KnowledgeRelationship:
    description: A directed relationship between two knowledge entities as a triple with metadata.
    attributes:
      subject:
        description: The source entity in the relationship.
        range: KnowledgeEntity
        required: true
      predicate:
        description: The type of relationship.
        range: RelationshipType
        required: true
      object:
        description: The target entity in the relationship.
        range: KnowledgeEntity
        required: true
      confidence:
        description: Confidence score from 0.0 to 1.0.
        range: float
        required: true
        minimum_value: 0.0
        maximum_value: 1.0
      provenance:
        description: Where and how this relationship was extracted.
        range: ExtractionProvenance
        inlined: true
      notes:
        description: Additional context or explanation for this relationship.
        range: string

  ExtractionResult:
    description: Container for the output of a single extraction run from a source document.
    attributes:
      source_document:
        description: The document that was processed.
        range: SourceDocument
        required: true
        inlined: true
      extracted_entities:
        description: Entities extracted in this run.
        multivalued: true
        range: KnowledgeEntity
        inlined_as_list: true
      extracted_relationships:
        description: Relationships extracted in this run.
        multivalued: true
        range: KnowledgeRelationship
        inlined_as_list: true
      extraction_timestamp:
        description: When this extraction was performed.
        range: datetime
      model_version:
        description: Version of the model used for extraction.
        range: string

  KnowledgeGraph:
    tree_root: true
    description: Root container for the entire knowledge graph.
    attributes:
      concepts:
        description: Concept entities in the graph.
        multivalued: true
        inlined_as_list: true
        range: Concept
      theories:
        description: Theory entities in the graph.
        multivalued: true
        inlined_as_list: true
        range: Theory
      persons:
        description: Person entities in the graph.
        multivalued: true
        inlined_as_list: true
        range: Person
      methods:
        description: Method entities in the graph.
        multivalued: true
        inlined_as_list: true
        range: Method
      assignments:
        description: Assignment entities in the graph.
        multivalued: true
        inlined_as_list: true
        range: Assignment
      relationships:
        description: Relationship triples in the graph.
        multivalued: true
        inlined_as_list: true
        range: KnowledgeRelationship
      source_documents:
        description: Source documents referenced by extracted knowledge.
        multivalued: true
        inlined_as_list: true
        range: SourceDocument